{% extends "base.html" %}
{% block title %}Edit Intern — TESRECO Internship Portal{% endblock %}

{% block content %}
<section class="form-section">
  <div class="form-card">
    <h2>Edit Intern</h2>
    <p class="form-sub">Update {{ intern.name }}'s details below.</p>

    <form method="POST" action="{{ url_for('edit_intern', intern_id=intern.intern_id) }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" value="{{ intern.name }}" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" value="{{ intern.email }}" required>
      </div>

      <div class="form-group">
        <label for="domain">Domain</label>
        <select id="domain" name="domain" required>
          {% for d in domains %}
          <option {{ 'selected' if intern.domain == d else '' }}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn-primary">Save Changes</button>
    </form>
  </div>
</section>
{% endblock %}
